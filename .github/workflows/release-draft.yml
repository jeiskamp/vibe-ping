name: Release Draft

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-artifacts:
    name: Build Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate signing secrets (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          [[ -z "${CSC_LINK:-}" ]] && missing+=("CSC_LINK")
          [[ -z "${CSC_KEY_PASSWORD:-}" ]] && missing+=("CSC_KEY_PASSWORD")
          [[ -z "${APPLE_ID:-}" ]] && missing+=("APPLE_ID")
          [[ -z "${APPLE_APP_SPECIFIC_PASSWORD:-}" ]] && missing+=("APPLE_APP_SPECIFIC_PASSWORD")
          [[ -z "${APPLE_TEAM_ID:-}" ]] && missing+=("APPLE_TEAM_ID")
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "Missing required macOS signing/notarization secrets: ${missing[*]}"
            exit 1
          fi
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Validate signing secrets (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          [[ -z "${WIN_CSC_LINK:-}" ]] && missing+=("WIN_CSC_LINK")
          [[ -z "${WIN_CSC_KEY_PASSWORD:-}" ]] && missing+=("WIN_CSC_KEY_PASSWORD")
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "Missing required Windows signing secrets: ${missing[*]}"
            exit 1
          fi
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Build watcher packages
        run: pnpm package:watcher
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          VIBEPING_REQUIRE_NOTARIZATION: ${{ matrix.os == 'macos-latest' && '1' || '0' }}

      - name: Upload release artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: apps/watcher/release/**
          if-no-files-found: error

  publish-draft:
    name: Publish Draft Release
    runs-on: ubuntu-latest
    needs: build-artifacts

    steps:
      - name: Download release bundles
        uses: actions/download-artifact@v4
        with:
          path: release-bundles

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          find release-bundles -type f ! -name "builder-debug.yml" -print0 \
            | sort -z \
            | xargs -0 sha256sum > release-bundles/SHA256SUMS.txt

      - name: Create or update draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            release-bundles/**/*.dmg
            release-bundles/**/*.zip
            release-bundles/**/*.exe
            release-bundles/**/*.AppImage
            release-bundles/**/*.tar.gz
            release-bundles/**/*.blockmap
            release-bundles/**/*.yml
            release-bundles/SHA256SUMS.txt
